name: "Pump Short (异常拉升做空)"
description: |
  系统化做空异常拉升标的。典型结构：集中买盘推升、散户净多拥挤、资金费率抬升、
  随后流动性与费率环境变化带来的均值回归或反转。在动能减弱且资金费率处于不利多头一侧时，按规则评估做空。

kline_interval: "3m"
kline_limit: 200

analysis_focus:
  - "24h 涨幅是否显著偏离常态（例如 >10%，作为异常拉升的筛选条件）"
  - "资金费率是否偏多（>0.05% 纳入监控）"
  - "价格是否出现潜在衰竭结构：长上影线、放量滞涨、连续小实体 K 线"
  - "成交量：拉升末段常见量能相对收缩"
  - "深度：卖盘一侧是否出现集中挂单或吸收特征"
  - "拉升斜率：由陡峭转为走平或更低高点序列"

entry_rules:
  - "仅做空（不做多）"
  - "条件1：24h 涨幅 > 10% 且资金费率 > 0.05%"
  - "条件2：价格出现至少一项见顶/衰竭类技术条件"
  - "条件3：K 线由陡峭拉升转为走平或形成更低高点"
  - "当上述条件按规则同时满足时执行入场评估，避免主观拖延"
  - "在规则允许范围内接受试错成本；以可重复的入场定义为准，而非单次完美拐点"

exit_rules:
  - "止损设在近期高点上方 2-3%"
  - "第一止盈：自高点回落约 10-15%"
  - "资金费率从极端区间回落至中性时，可分批减仓或了结"
  - "分批止盈：约 50% 仓位在第一目标，其余配合移动止损"

scanner_overrides:
  min_price_change_pct: 8.0
  min_volume_usdt: 200000
  top_n_pairs: 10
  funding_high_threshold: 0.0005
  category_weights:
    high_volume: 0.1
    high_volatility: 0.3
    funding_rate_anomaly: 0.6

risk_overrides:
  stop_loss_pct: 0.03
  take_profit_ratio: 4.0
  trailing_stop_pct: 0.015
  max_position_pct: 0.35
  max_open_positions: 8
  min_leverage: 15
  max_leverage: 50

extra_instructions: |
  你是本策略下的算法化做空模块：在异常拉升与拥挤多头环境下，按风险参数输出 SHORT / CLOSE / HOLD。

  === 标的定义 ===
  异常拉升标的指短期价格显著偏离、常伴随集中流动性与费率异动的合约。任务是在衰竭与拥挤度信号叠加时，系统化评估做空。

  === 核心约束 ===
  1. 仅做空（action 只能是 "SHORT", "CLOSE", 或 "HOLD"）
  2. 在规则化衰竭条件出现时完成信号生成，不追求主观意义上的“完美顶”
  3. 杠杆与仓位在 risk_overrides 与信号强度映射的范围内配置；止损与仓位为风险管理的硬约束

  === 强衰竭信号（满足一项即可与费率/涨幅条件一并评估） ===
  1. 更低高点序列
  2. 长上影线
  3. 放量下跌
  4. 资金费率极端（例如 >0.1%）且价格走平或斜率下降

  === 辅助信号 ===
  5. 成交量相对前期拉升收缩
  6. 订单簿 asks 相对 bids 偏重
  7. 价格自阶段高点回落约 2% 以上

  === 参数映射（在风险上限内） ===
  - entry_price: 当前价
  - stop_loss: 近期最高价上方 2-3%
  - take_profit: 自高点回落约 10-20%
  - leverage: 15-50x（信号一致性高时可取区间上沿，须仍在 max_leverage 内）
  - position_size_pct: 0.20-0.35
  - confidence: 一项强信号可 >0.60；两项及以上可 >0.80

  执行逻辑：在流动性与费率数据支持的前提下，等待规则化结构出现，再按同一套阈值输出可复核的交易信号。
